# NOTE: This project uses SonarCloud Automatic Analysis, which does NOT read this file.
# Exclusions/scope are configured in the SonarCloud UI (Administration -> Analysis Scope).
# This file is kept for reference and in case the project switches to CI-based scanning.

# Información del proyecto
sonar.projectKey=NaferJ_luisardito-shop-backend
sonar.organization=naferj

# Excluir archivos que no deben analizarse
sonar.exclusions=\
  node_modules/**,\
  seeders/**,\
  migrations/**,\
  scripts/**,\
  **/*.test.js,\
  **/*.spec.js,\
  src/utils/kickWebhook.util.js

# Directorio de código fuente
sonar.sources=src

# Codificación
sonar.sourceEncoding=UTF-8

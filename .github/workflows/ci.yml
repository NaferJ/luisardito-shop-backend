name: CI - Backend

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  build-and-test:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Boot smoke check
        run: npm run smoke

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build --tag backend:${{ github.sha }} .
